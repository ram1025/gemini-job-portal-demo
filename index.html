<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juju AI Talent Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-4xl mx-auto p-6">
    <h1 class="text-4xl font-bold text-center mb-6">Juju AI Talent Hub</h1>
    
    <!-- TABS -->
    <div class="flex gap-4 mb-6">
      <button onclick="showTab('candidate')" id="btn-candidate" class="flex-1 bg-blue-500 text-white p-3 rounded font-bold">For Job Seekers</button>
      <button onclick="showTab('recruiter')" id="btn-recruiter" class="flex-1 bg-gray-300 text-black p-3 rounded font-bold">For Recruiters</button>
    </div>

    <!-- CANDIDATE TAB -->
    <div id="candidate-tab" class="bg-white p-8 rounded-lg shadow">
      <h2 class="text-2xl font-bold mb-4">Upload Your Resume</h2>
      <input type="file" id="resumeFile" accept=".pdf,.docx" class="w-full p-2 border rounded mb-4">
      <button onclick="uploadResume()" class="w-full bg-green-500 text-white p-3 rounded font-bold hover:bg-green-600">Upload Resume</button>
      <p id="uploadMsg" class="mt-4 text-green-700"></p>
    </div>

    <!-- RECRUITER TAB -->
    <div id="recruiter-tab" class="bg-white p-8 rounded-lg shadow" style="display:none">
      <h2 class="text-2xl font-bold mb-4">Find Candidates with Gemini AI</h2>
      <input type="text" id="jobTitle" placeholder="Job Title - Ex: Senior Talent Acquisition" class="w-full p-2 border rounded mb-4">
      <textarea id="jobDesc" placeholder="Job Description + Skills" rows="4" class="w-full p-2 border rounded mb-4">IT Recruitment, Naukri, LinkedIn, Full-cycle hiring, 3+ years</textarea>
      <button onclick="searchCandidates()" class="w-full bg-blue-500 text-white p-3 rounded font-bold hover:bg-blue-600">Search Candidates</button>
      <div id="results" class="mt-6"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
