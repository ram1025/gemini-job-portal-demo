<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Job Portal Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10">
  <div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow">
    <h1 class="text-3xl font-bold mb-6">Gemini Job Portal Demo</h1>
    <form id="jobForm">
      <input type="text" id="title" placeholder="Job Title" class="w-full p-2 border rounded mb-4" value="Frontend Developer">
      <textarea id="description" placeholder="Job Description" rows="4" class="w-full p-2 border rounded mb-4">
Need React, Node.js, Tailwind, 2 years experience</textarea>
      <button type="submit" class="w-full bg-blue-500 text-white p-3 rounded font-bold hover:bg-blue-600">
        Post Job & Get Candidates
      </button>
    </form>
    <div id="results" class="mt-6"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
