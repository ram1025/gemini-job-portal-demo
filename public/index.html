<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Job Portal Demo</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    form { background: white; padding: 20px; border-radius: 8px; max-width: 500px; }
    input, textarea, button { width: 100%; padding: 10px; margin: 10px 0; }
    button { background: #4285F4; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Gemini Job Portal Demo</h1>
  <form id="job-form">
    <input type="text" id="job-title" placeholder="Job Title e.g. React Developer" required>
    <textarea id="job-description" placeholder="Job Description" rows="4" required></textarea>
    <button type="submit">Post Job & Get Candidates</button>
  </form>
  <div id="result"></div>
  <script src="script.js"></script>
</body>
</html>
